# =================================================
# Kitty 基础设置（字体/窗口/滚动/布局）
# =================================================

# 终端能力
term xterm-256color
auto_reload_config 0.1
shell_integration enabled
allow_remote_control yes

# 布局
enabled_layouts splits

# 外观
background_opacity 0.94
window_padding_width 30 10 7 5
confirm_os_window_close 0

# 标签栏
tab_bar_edge top
tab_bar_style separator
tab_separator " "
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_title_max_length 32
tab_title_template "{index} {title}"

# 字体
font_family FiraCode Nerd Font
font_size 14.0

# 光标
cursor_trail 3
cursor_trail_decay 0.1 0.4

# 滚动
scrollback_lines 20000
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 3.0

# 复制 / 粘贴
copy_on_select clipboard
strip_trailing_spaces smart
paste_actions quote-urls-at-prompt,confirm-if-large,replace-dangerous-control-codes

# URL / 超链接
detect_urls yes
underline_hyperlinks hover
show_hyperlink_targets cmd

# 提醒
enable_audio_bell no
visual_bell_duration 0.08
window_alert_on_bell yes
bell_on_tab " ! "

# macOS
macos_option_as_alt left
macos_quit_when_last_window_closed yes
remember_window_size yes
