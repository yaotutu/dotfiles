# =================================================
# Kitty 快捷键
# =================================================

# 对齐 WezTerm 的 disable_default_key_bindings = true
clear_all_shortcuts yes

# 跨平台统一修饰键：Linux 用 super/Win，macOS 用 cmd（Kitty 中 super 是 cmd 的别名）
kitty_mod super

# 剪贴板
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# 工具
map kitty_mod+u open_url_with_hints
map shift+enter send_text all \x1b\r
map kitty_mod+alt+r reload_config_file
map kitty_mod+, edit_config_file
map kitty_mod+alt+, debug_config
map kitty_mod+shift+, reload_config_file
map kitty_mod+shift+p command_palette
map kitty_mod+shift+r set_tab_title
map kitty_mod+alt+period show_scrollback

# OS 窗口
map kitty_mod+n new_os_window
map kitty_mod+f toggle_fullscreen

# Tab
map kitty_mod+t new_tab
map kitty_mod+shift+t new_tab
map kitty_mod+shift+w close_tab
map kitty_mod+shift+/ select_tab
map kitty_mod+shift+space last_used_layout
map kitty_mod+[ previous_tab
map kitty_mod+] next_tab
map kitty_mod+shift+[ move_tab_backward
map kitty_mod+shift+] move_tab_forward
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

# 分屏 / Pane
map kitty_mod+d launch --cwd=current --location=vsplit
map kitty_mod+shift+d launch --cwd=current --location=hsplit
map kitty_mod+w close_window
map kitty_mod+enter toggle_layout stack
map kitty_mod+shift+h neighboring_window left
map kitty_mod+shift+j neighboring_window down
map kitty_mod+shift+k neighboring_window up
map kitty_mod+shift+l neighboring_window right
map kitty_mod+shift+o focus_visible_window
map kitty_mod+alt+left resize_window narrower
map kitty_mod+alt+right resize_window wider
map kitty_mod+alt+up resize_window taller
map kitty_mod+alt+down resize_window shorter
map kitty_mod+alt+0 resize_window reset

# 字体缩放
map kitty_mod+= change_font_size all +1.0
map kitty_mod+- change_font_size all -1.0
map kitty_mod+0 change_font_size all 0
