# ==========================================
# tmux 完整配置 (平替 Zellij 方案)
# ==========================================

# ==========================
# 1. 基础设置 (默认 "Locked" 状态)
# ==========================
# 设置 Prefix 为 Ctrl-a (替代 Zellij 中的 Ctrl-a 解锁)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 开启鼠标支持 (滚轮查看输出、点击切换 Pane)
set -g mouse on

# 窗口和面板序号从 1 开始 (配合 Alt 1-9 的按键习惯)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on # 关闭窗口后自动重新排序编号

# 开启 256 色和真色彩支持 (防止终端代码高亮变暗)
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# 消除按下 ESC 键的延迟 (对 Vim 和 TUI 应用极为重要，防止键位判定错乱)
set -sg escape-time 10


# ==========================
# 2. 无前缀快捷键 (等价于 Zellij 的 Locked 模式绑定)
# ==========================
# 使用 -n 参数，不需要按 Ctrl-a 就能直接触发 (Alt + 数字键直达 Tab)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# ==========================
# 3. 面板与窗口管理 (等价于 Zellij 的 Normal 模式，需先按 Ctrl-a)
# ==========================
# 新建 Tab (Window) 并保持当前路径
bind c new-window -c "#{pane_current_path}"

# 拆分面板 (等价于 Zellij 绑定的 n 和 N)
bind n split-window -h -c "#{pane_current_path}" # 在右侧新建面板
bind N split-window -v -c "#{pane_current_path}" # 在下方新建面板

# 关闭当前面板 (等价于 Zellij 绑定的 x)
bind x kill-pane

# 全屏/取消全屏当前面板 (等价于 Zellij 绑定的 f)
bind f resize-pane -Z

# 面板间切换 (Vim 风格 hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整面板大小 (-r 表示按住 Prefix 后可以连按，等价于 Zellij 的 HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ==========================
# 4. 复制模式 (集成 Mac 系统剪贴板)
# ==========================
# 使用 Vim 按键习惯进行选择和复制
setw -g mode-keys vi

# 按下 v 开始选择，按 y 复制到 Mac 的 pbcopy
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# 鼠标拖拽选中松开后自动复制到 Mac 剪贴板
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# ==========================
# 5. 状态栏美化 (Catppuccin/Nord 风格 + 胶囊设计)
# ==========================
set -g status-position bottom       # 状态栏放在底部
set -g status-justify centre        # Tabs (Window) 居中显示
set -g status-style bg=default      # 状态栏整体背景透明
set -g status-interval 2            # 状态栏刷新频率 (秒)，保持 Git 脚本实时更新

# --- 底部左侧：Mode 指示器 ---
# 动态判断状态：Prefix 激活 -> NORMAL, 滚动模式 -> SCROLL, 默认 -> LOCK
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[bg=#aa87fe,fg=#3c01cd,bold]  NORMAL ,#{?pane_in_mode,#[bg=#412da2,fg=#c9c0ff,bold]  SCROLL ,#[bg=#6e5fb7,fg=#ffffff,bold]  LOCK }}"

# --- 底部中间：Tabs (窗口标签) ---
set -g window-status-separator " "  # 标签之间的间隔
# 普通 Tab 样式 (灰底/透明底，紫灰字)，附带全屏图标 󰊓 判断
set -g window-status-format "#[fg=#7a6c94,bold] #I #W #{?window_zoomed_flag,󰊓,}"
# 激活态 Tab 样式 (紫底白字)
set -g window-status-current-format "#[bg=#9c73fe,fg=#f2ecff,bold] #I #W #{?window_zoomed_flag,󰊓,}"

# --- 底部右侧：Git 状态 + 时间 + Session ---
# 挂载了你原有的 git_info_processor.sh 脚本
set -g status-right-length 150
set -g status-right "#[fg=#7a6c94]#[bg=#7a6c94,fg=#ffffff,bold] #(/bin/bash ~/.config/zellij/scripts/git_info_processor.sh) #[bg=default,fg=#7