# ==============================================================================
# Tmux 终极配置 - 2026 稳定版 (Zellij 平替 + XDG 规范)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心交互设置
# ------------------------------------------------------------------------------
set -g prefix C-a                               # Prefix 改为 Ctrl-a
unbind C-b
bind C-a send-prefix

set -g mouse on                                 # 开启鼠标支持
set -g base-index 1                             # 窗口序号从 1 开始
setw -g pane-base-index 1
set -g renumber-windows on                      # 自动重排窗口序号
set -g default-terminal "xterm-256color"        # 256 色支持
set-option -ga terminal-overrides ",xterm-256color:Tc" # 真色彩支持
set -sg escape-time 0                           # 彻底消除 ESC 延迟

# ------------------------------------------------------------------------------
# 2. 无前缀快捷键 (Locked 模式 - 直接切换 Tab)
# ------------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ------------------------------------------------------------------------------
# 3. 面板与窗口管理 (需按 Ctrl-a)
# ------------------------------------------------------------------------------
bind c new-window -c "#{pane_current_path}"      # 新建 Tab
bind n split-window -h -c "#{pane_current_path}" # 左右分屏
bind N split-window -v -c "#{pane_current_path}" # 上下分屏
bind x kill-pane                                 # 关闭当前面板
bind X kill-window                               # 强制关闭整个 Tab (无确认)
bind f resize-pane -Z                            # 全屏切换

# Vim 风格焦点切换 (h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim 风格调整大小 (H/J/K/L, -r 表示可连按)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 热重载配置
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  Tmux 配置已重新加载 🚀 "

# ------------------------------------------------------------------------------
# 4. 复制模式 (Mac 剪贴板集成)
# ------------------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ------------------------------------------------------------------------------
# 5. UI 状态栏美化 (样式全拆分，规避逗号 Bug)
# ------------------------------------------------------------------------------
set -g status-position bottom       
set -g status-justify left          
set -g status-style bg=default      
set -g status-interval 2            

# --- 底部左侧：Mode 指示器 ---
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[bg=#00afff]#[fg=#000000]#[bold] ⚡ COMMAND #[bg=default]#[fg=#00afff]#[nobold],#[bg=#5fff00]#[fg=#000000]#[bold]  LOCKED #[bg=default]#[fg=#5fff00]#[nobold]}"

# --- 底部中间：Tabs ---
set -g window-status-separator "" 
set -g window-status-format "#[bg=default]#[fg=#8a8a8a]  #I  #W  "
set -g window-status-current-format "#[bg=default]#[fg=#00afff]#[bg=#00afff]#[fg=#ffffff]#[bold] #I  #W #{?window_zoomed_flag,󰊓,} #[bg=default]#[fg=#00afff]#[nobold]"

# --- 底部右侧：Git + 时间 + 电池 ---
set -g status-right-length 250
set -g status-right "#[bg=default]#[fg=#3a3a3a]#[bg=#3a3a3a]#[fg=#d0d0d0] #(/bin/bash $HOME/.config/tmux/scripts/git_info.sh) #[bg=#3a3a3a]#[fg=#8a8a8a]#[bg=#8a8a8a]#[fg=#000000]#[bold] %m-%d %H:%M #[bg=#8a8a8a]#[fg=#00afff]#[bg=#00afff]#[fg=#ffffff]#[bold] #(/bin/bash $HOME/.config/tmux/scripts/battery.sh) "