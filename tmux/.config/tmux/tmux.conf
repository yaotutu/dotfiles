# ==============================================================================
# Tmux 终极配置 - 2026 稳定版
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心交互设置
# ------------------------------------------------------------------------------
set -g prefix C-a                               # Prefix 改为 Ctrl-a
unbind C-b
bind C-a send-prefix

set -g mouse on                                 # 开启鼠标支持
set -g base-index 1                             # 窗口序号从 1 开始
setw -g pane-base-index 1
set -g renumber-windows on                      # 自动重排窗口序号
set -g default-terminal "tmux-256color"        # 256 色支持
set-option -ga terminal-overrides ",xterm-256color:Tc" # 真色彩支持
set -sg escape-time 0                           # 彻底消除 ESC 延迟
set -g history-limit 50000                      # 增加历史记录
set -g window-size latest                       # 窗口大小跟随最新客户端
setw -g aggressive-resize on                    # 积极调整窗口大小

# 活动监控（窗口有新输出时高亮）
setw -g monitor-activity on
set -g visual-activity off
# 使用与主题协调的颜色（Nord 风格的 aurora red）
set -g window-status-activity-style "bg=#bf616a,fg=#1e1e2e,bold"

# 复制模式样式（让搜索提示更明显）
setw -g mode-style "bg=#f38ba8,fg=#1e1e2e,bold"

# ------------------------------------------------------------------------------
# 2. 无前缀快捷键 (Locked 模式 - 直接切换 Tab)
# ------------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ------------------------------------------------------------------------------
# 3. 面板与窗口管理 (需按 Ctrl-a)
# ------------------------------------------------------------------------------
bind c new-window -c "#{pane_current_path}"      # 新建 Tab
bind n split-window -h -c "#{pane_current_path}" # 左右分屏
bind N split-window -v -c "#{pane_current_path}" # 上下分屏
bind x kill-pane                                 # 关闭当前面板
bind X kill-window                               # 强制关闭整个 Tab (无确认)
bind f resize-pane -Z                            # 全屏切换

# Vim 风格焦点切换 (h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim 风格调整大小 (H/J/K/L, -r 表示可连按)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 热重载配置
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux 配置已重新加载"

# ------------------------------------------------------------------------------
# 4. 复制模式 (Mac 剪贴板集成)
# ------------------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind / copy-mode \; send-key ?                  # / 直接进入搜索模式

# ------------------------------------------------------------------------------
# 5. TPM 插件管理器
# ------------------------------------------------------------------------------

# 自动安装 TPM（如果不存在）
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'  # 模式指示器
set -g @plugin 'tmux-plugins/tmux-battery'      # 电池状态
set -g @plugin 'tmux-plugins/tmux-cpu'          # CPU 使用率
set -g @plugin 'tmux-plugins/tmux-resurrect'    # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum'    # 自动保存会话
set -g @plugin 'tmux-plugins/tmux-yank'         # 剪贴板增强

# ------------------------------------------------------------------------------
# 6. 插件配置
# ------------------------------------------------------------------------------

# tmux-resurrect: 保存/恢复会话
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: 自动保存 (每 15 分钟)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ------------------------------------------------------------------------------
# 7. 状态栏配置
# ------------------------------------------------------------------------------

# 状态栏整体设置
set -g status-position bottom
set -g status-justify "centre"
set -g status-interval 2
set -g status-left-length 100
set -g status-right-length 100

# 状态栏颜色
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 窗口标签样式
set -g window-status-style "fg=#6c7086"
set -g window-status-current-style "fg=#89b4fa,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# 状态栏左侧：模式指示器 + 会话名
set -g status-left ""
set -ga status-left "#{tmux_mode_indicator} "
set -ga status-left "#[fg=#89b4fa]#{session_name} "

# 状态栏右侧：应用 + CPU + 电池
set -g status-right ""
set -ga status-right "#[fg=#585b70]│ #[fg=#a6adc8]#{pane_current_command} "
# CPU 显示：使用默认颜色或重置颜色避免冲突
set -ga status-right "#[fg=#585b70]│ #[fg=#a6adc8]#{cpu_percentage} "
set -ga status-right "#[fg=#585b70]│ #[fg=#a6adc8]#{battery_icon} #{battery_percentage}% "

# 面板边框样式
setw -g pane-border-status off
setw -g pane-border-style "fg=#313244"
setw -g pane-active-border-style "fg=#89b4fa"
setw -g pane-border-lines single

# ------------------------------------------------------------------------------
# 8. 初始化 TPM (必须放在配置文件最后)
# ------------------------------------------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'

# ------------------------------------------------------------------------------
# 9. 清理残留的旧配置
# ------------------------------------------------------------------------------
# 如果之前有使用过 Catppuccin 主题，可能残留配置
# 在活动会话中可以运行: tmux show-options -g | grep catppuccin
# 手动清除: tmux set-option -gu @catppuccin_flavor 等
