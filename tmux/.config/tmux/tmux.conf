# ==============================================================================
# Tmux 终极配置 - 2026 稳定版 (Zellij 平替 + Catppuccin 主题)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心交互设置
# ------------------------------------------------------------------------------
set -g prefix C-a                               # Prefix 改为 Ctrl-a
unbind C-b
bind C-a send-prefix

set -g mouse on                                 # 开启鼠标支持
set -g base-index 1                             # 窗口序号从 1 开始
setw -g pane-base-index 1
set -g renumber-windows on                      # 自动重排窗口序号
set -g default-terminal "tmux-256color"        # 256 色支持
set-option -ga terminal-overrides ",xterm-256color:Tc" # 真色彩支持
set -sg escape-time 0                           # 彻底消除 ESC 延迟

# ------------------------------------------------------------------------------
# 2. 无前缀快捷键 (Locked 模式 - 直接切换 Tab)
# ------------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ------------------------------------------------------------------------------
# 3. 面板与窗口管理 (需按 Ctrl-a)
# ------------------------------------------------------------------------------
bind c new-window -c "#{pane_current_path}"      # 新建 Tab
bind n split-window -h -c "#{pane_current_path}" # 左右分屏
bind N split-window -v -c "#{pane_current_path}" # 上下分屏
bind x kill-pane                                 # 关闭当前面板
bind X kill-window                               # 强制关闭整个 Tab (无确认)
bind f resize-pane -Z                            # 全屏切换

# Vim 风格焦点切换 (h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim 风格调整大小 (H/J/K/L, -r 表示可连按)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 热重载配置
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  Tmux 配置已重新加载 🚀 "

# ------------------------------------------------------------------------------
# 4. 复制模式 (Mac 剪贴板集成)
# ------------------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ------------------------------------------------------------------------------
# 5. TPM 插件管理器
# ------------------------------------------------------------------------------

# 自动安装 TPM（如果不存在）
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# 插件列表
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'        # 主题核心
set -g @plugin 'tmux-plugins/tmux-battery'      # 电池状态
set -g @plugin 'tmux-plugins/tmux-cpu'          # CPU 使用率
set -g @plugin 'tmux-plugins/tmux-online-status' # 网络状态
set -g @plugin 'tmux-plugins/tmux-resurrect'    # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum'    # 自动保存会话
set -g @plugin 'tmux-plugins/tmux-yank'         # 剪贴板增强

# ------------------------------------------------------------------------------
# 6. 插件配置
# ------------------------------------------------------------------------------

# tmux-resurrect: 保存/恢复会话
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: 自动保存 (每 15 分钟)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ------------------------------------------------------------------------------
# 7. Catppuccin 主题配置
# ------------------------------------------------------------------------------

# 选择配色方案: latte (浅色), frappe (中浅), macchiato (中深), mocha (深色)
set -g @catppuccin_flavor "mocha"

# 窗口标签样式: basic, rounded, slanted, custom, none
set -g @catppuccin_window_status_style "rounded"

# 窗口文本配置
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag, 󰊓,}"

# 状态栏整体设置
set -g status-position bottom
set -g status-justify "left"
set -g status-interval 2
set -g status-left-length 100
set -g status-right-length 200

# ------------------------------------------------------------------------------
# 8. 状态栏左侧配置
# ------------------------------------------------------------------------------

# 方法1: 使用 Catppuccin 内置模块 (推荐，最稳定)
# set -g status-left "#{E:@catppuccin_status_session}"

# 方法2: 自定义 Prefix 指示器 + 会话名 (手动定义颜色，不依赖 @thm_ 变量)
set -g status-left ""
# Prefix 指示器 - 使用硬编码颜色避免变量未加载问题
set -ga status-left "#{?client_prefix,#[bg=#f38ba8,fg=#1e1e2e,bold] 󰘳 PREFIX ,#[bg=default,fg=#cba6f7] 󰘳 LOCKED }"
set -ga status-left "#[bg=default,fg=#585b70] │ "
set -ga status-left "#[bg=default,fg=#89b4fa]  #{session_name} "

# ------------------------------------------------------------------------------
# 9. 状态栏右侧配置
# ------------------------------------------------------------------------------

set -g status-right ""
set -ga status-right "#[bg=default,fg=#585b70]│ "
set -ga status-right "#{E:@catppuccin_status_application}"
set -ga status-right " "
set -ga status-right "#[bg=default,fg=#585b70]│ "
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ga status-right " "
set -ga status-right "#[bg=default,fg=#585b70]│ "
set -ga status-right "#{E:@catppuccin_status_session}"
set -ga status-right " "
set -ga status-right "#[bg=default,fg=#585b70]│ "
set -ga status-right "#{E:@catppuccin_status_date_time}"
set -ga status-right " "
set -ga status-right "#[bg=default,fg=#585b70]│"
set -agF status-right "#{E:@catppuccin_status_battery}"

# 面板边框样式
setw -g pane-border-status off
setw -g pane-border-style "fg=#313244"
setw -g pane-active-border-style "fg=#585b70"
setw -g pane-border-lines single

# ------------------------------------------------------------------------------
# 10. 初始化 TPM (必须放在配置文件最后)
# ------------------------------------------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'

# ------------------------------------------------------------------------------
# 11. 手动加载 cpu 和 battery 脚本 (关键！解决变量不解析问题)
# ------------------------------------------------------------------------------
run '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.config/tmux/plugins/tmux-battery/battery.tmux'